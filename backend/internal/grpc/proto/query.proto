syntax = "proto3";
package query;

import "google/protobuf/timestamp.proto";

option go_package = "internal/grpc/gen/query;query";

service QueryService {
  rpc AuthLogs(AuthLogsRequest) returns (AuthLogsResponse);
  rpc PaymentLogs(PaymentLogsRequest) returns (PaymentLogsResponse);
  rpc OrderLogs(OrderLogsRequest) returns (OrderLogsResponse);
}

// --- Requests ---

message AuthLogsRequest {
  optional string service = 1;
  optional string level = 2;
  optional string message = 3;
  optional string request_id = 4;
  optional string user_id = 5;
  optional string ip = 6;
  optional google.protobuf.Timestamp start_timestamp = 7;
  optional google.protobuf.Timestamp end_timestamp = 8;
  optional string sorted_value = 9;
  int32 size = 10;
}

message OrderLogsRequest {
  optional string service = 1;
  optional string level = 2;
  optional string message = 3;
  optional string request_id = 4;
  optional string user_id = 5;
  optional string order_id = 6;
  optional string carrier = 7;
  optional string product_id = 8;
  optional google.protobuf.Timestamp start_timestamp = 9;
  optional google.protobuf.Timestamp end_timestamp = 10;
  optional string sorted_value = 11;
  int32 size = 12;
}

message PaymentLogsRequest {
  optional string service = 1;
  optional string level = 2;
  optional string message = 3;
  optional string request_id = 4;
  optional string order_id = 5;
  optional string payment_id = 6;
  optional string gateway = 7;
  optional float amount = 8;
  optional google.protobuf.Timestamp start_timestamp = 9;
  optional google.protobuf.Timestamp end_timestamp = 10;
  optional string sorted_value = 11;
  int32 size = 12;
}

// --- Response Messages ---

message AuthLogs {
  string service = 1;
  string level = 2;
  string message = 3;
  string request_id = 4;
  string user_id = 5;
  string ip = 6;
  string timestamp = 7;
}

message OrderLogs {
  string service = 1;
  string level = 2;
  string message = 3;
  string request_id = 4;
  string user_id = 5;
  string order_id = 6;
  string carrier = 7;
  string product_id = 8;
  int32 stock_left = 9;
  string timestamp = 10;
}

message PaymentLogs {
  string service = 1;
  string level = 2;
  string message = 3;
  string request_id = 4;
  string order_id = 5;
  string payment_id = 6;
  string gateway = 7;
  float amount = 8;
  string timestamp = 9;
}

message Pagination {
  bool has_more = 1;
  string sorted_value = 2;
}
// --- Responses ---

message AuthLogsResponse {
  repeated AuthLogs logs = 1;
  Pagination base_response = 2;
}

message OrderLogsResponse {
  repeated OrderLogs logs = 1;
  Pagination base_response = 2;
}

message PaymentLogsResponse {
  repeated PaymentLogs logs = 1;
  Pagination base_response = 2;
}
