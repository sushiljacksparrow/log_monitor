services:

  frontend:
    build:
      context: ./frontend      # path to your frontend folder
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/usr/share/grafana/data

  auth-service:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      dockerfile: cmd/auth-service/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      ELASTIC_SEARCH_HOST: http://elasticsearch:9200
    depends_on:
      - kafka

  order-service:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      dockerfile: cmd/order-service/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      ELASTIC_SEARCH_HOST: http://elasticsearch:9200
    depends_on:
      - kafka

  payment-service:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      dockerfile: cmd/payment-service/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      ELASTIC_SEARCH_HOST: http://elasticsearch:9200
    depends_on:
      - kafka

  query-service:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      dockerfile: cmd/query-service/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      ELASTIC_SEARCH_HOST: http://elasticsearch:9200
    ports:
      - "50051:50051"
    depends_on:
      - kafka
      - elasticsearch

  log-processor:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      dockerfile: cmd/log-processor/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      ELASTIC_SEARCH_HOST: http://elasticsearch:9200
    depends_on:
      - kafka
      - elasticsearch

  api-gateway:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      dockerfile: cmd/api-gateway/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      ELASTIC_SEARCH_HOST: http://elasticsearch:9200
      QUERY_SERVICE_ADDR: query-service:50051
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - query-service


volumes:
  elasticsearch_data:
  grafana_data:
